<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>React元素例子</title>
  </head>
  <body>
    <div id="react-container"></div>
    <script src="../js/react.development.js"></script>
    <script src="../js/react-dom.development.js"></script>
    <script>
      const dish = React.createElement(
        "section",
        { id: "baked-salmon" },
        React.createElement("h1", null, "烤三文鱼"),
        React.createElement(
          "ul",
          { className: "ingredients" },
          React.createElement("li", null, "1磅三文鱼"),
          React.createElement("li", null, "1杯松子"),
          React.createElement("li", null, "2杯黄油生菜"),
          React.createElement("li", null, "1只黄南瓜"),
          React.createElement("li", null, "1/2杯橄榄油"),
          React.createElement("li", null, "3瓣大蒜")
        ),
        React.createElement(
          "section",
          { className: "instructions" },
          React.createElement("h2", null, "烹饪说明"),
          React.createElement("p", null, "将烤箱预热至350度."),
          React.createElement("p", null, "将橄榄油撒在玻璃烤盘上."),
          React.createElement("p", null, "加入三文鱼，大蒜和松子..."),
          React.createElement("p", null, "烤15分钟."),
          React.createElement("p", null, "加入胡桃南瓜并放入..."),
          React.createElement("p", null, "从烤箱中取出，冷却15分钟 ....")
        )
      );

      ReactDOM.render(dish, document.getElementById("react-container"));
      console.log("dish element", dish);
    </script>
  </body>
</html>
